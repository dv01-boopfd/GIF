<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            /* Задаем размеры и поворот напрямую видео */
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(270deg) scale(1.8); /* scale увеличивает видео, чтобы не было пустых краев после поворота */
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Обрати внимание: теперь тут просто название файла -->
    <video autoplay loop muted playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

</body>
</html>
